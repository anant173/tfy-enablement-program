type: service
name: simple-calculator-mcp-skills
image:
  type: build
  build_source:
    type: git
    repo_url: https://github.com/anant173/tfy-enablement-program
    branch_name: cox-training
    ref: 78a993c34a9e09f20965430c9f46df957d759ab4
  build_spec:
    type: tfy-python-buildpack
    build_context_path: ./deploy-mcp-server/simple-calculator-mcp
    command: python main.py
    python_version: '3.11'
    python_dependencies:
      type: pip
      requirements_path: requirements.txt
ports:
  - expose: true
    port: 8000
    protocol: TCP
    app_protocol: http
    host: >-
      simple-calculator-mcp-skills-mcp-servers-deployment-8000.cox-training.truefoundry.cloud
resources:
  node:
    type: node_selector
    capacity_type: spot_fallback_on_demand
  cpu_request: 0.2
  cpu_limit: 0.5
  memory_request: 200
  memory_limit: 500
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
workspace_fqn: tfy-training-cox:mcp-servers-deployment
replicas: 1
allow_interception: false
